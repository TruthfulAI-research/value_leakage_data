name: Deploy site to GitHub Pages

# Publishes the project site: site/ at the root (landing page) and static/
# (rollout browser dashboard + data JSONs) under /browser/.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "static/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # The repo holds ~8 GB of raw caches; fetch only the two published
      # directories (blobless clone + sparse checkout).
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          sparse-checkout: |
            site
            static
      - name: Assemble site (landing at /, dashboard at /browser/)
        run: |
          mkdir _site
          cp -r site/. _site/
          mkdir _site/browser
          cp -r static/. _site/browser/
          touch _site/.nojekyll
          du -sh _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
